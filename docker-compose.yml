services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./app/:/app/
    networks:
      - kernel_bridge
    env_file:
      - .env

  kernel:
    container_name: kernel
    platform: ${KERNEL_PLATFORM}
    image: ghcr.io/a-team-name/lambda-kernculus:latest
    volumes:
      - ./work:/home/jovyan/work
    networks:
      - kernel_bridge
    ports:
      - "8888:8888"
    command: "start-notebook.sh --NotebookApp.token="

networks:
  kernel_bridge:
    external: true
